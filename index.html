<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mares Engineering</title>
    <style>
      :root {
        --bg: #050607;
        --fg: #efefef;
        --muted: #b4b4b4;
        --display-font: 'Mares Display', 'Eurostile Extended Black', 'Eurostyle Extended Black', 'Arial Black', 'Trebuchet MS', 'Franklin Gothic Demi Cond', sans-serif;
        --body-font: Baskerville, 'Baskerville Old Face', 'Times New Roman', serif;
      }

      @font-face {
        font-family: 'Mares Display';
        src: url('assets/fonts/eurostile-extended-black.woff2') format('woff2');
        font-style: normal;
        font-weight: 900;
        font-display: swap;
      }

      * {
        box-sizing: border-box;
      }

      html {
        overflow-x: hidden;
        background: var(--bg);
      }

      body {
        margin: 0;
        background:
          radial-gradient(ellipse 66% 22% at 50% 53%, rgba(24, 60, 90, 0.15), rgba(12, 31, 50, 0.07) 42%, rgba(5, 6, 7, 0) 72%),
          radial-gradient(ellipse 130% 92% at 50% 48%, #1b1c1d 0%, #101214 44%, var(--bg) 100%);
        color: var(--fg);
        min-height: 100vh;
        font-family: var(--body-font);
        font-weight: 400;
        letter-spacing: 0;
        overflow-x: hidden;
      }

      .page {
        display: grid;
        align-content: center;
        justify-items: center;
        min-height: 100vh;
        width: min(100%, 1680px);
        max-width: none;
        margin: 0 auto;
        padding: 48px 24px;
        line-height: 1.55;
        text-align: center;
        overflow-x: hidden;
      }

      .logo-field {
        position: relative;
        isolation: isolate;
        display: inline-grid;
        place-items: center;
        width: min(100%, 1540px);
        margin-top: 5vh;
      }

      .logo-field::before,
      .logo-field::after {
        position: absolute;
        z-index: -2;
        content: "";
        pointer-events: none;
      }

      .logo-field::before {
        width: 102%;
        height: 72%;
        background:
          radial-gradient(ellipse at center, rgba(83, 164, 225, 0.1), rgba(30, 82, 125, 0.06) 38%, rgba(5, 6, 7, 0) 72%);
        filter: blur(18px);
      }

      .logo-field::after {
        width: 110%;
        height: 118%;
        background:
          radial-gradient(ellipse at center, rgba(18, 58, 90, 0.1), rgba(5, 6, 7, 0) 70%);
        filter: blur(40px);
      }

      .brand-logo {
        position: relative;
        margin: 0;
        font-family: var(--display-font);
        font-size: clamp(1rem, 5.45vw, 7rem);
        font-weight: 900;
        letter-spacing: clamp(0.026em, 0.42vw, 0.068em);
        font-stretch: expanded;
        line-height: 1;
        text-transform: uppercase;
        white-space: nowrap;
        color: transparent;
        background:
          linear-gradient(
            180deg,
            #ffffff 0%,
            #eefbff 12%,
            #cce9f7 34%,
            #a8cddd 58%,
            #79a9c4 78%,
            #4d7fa5 100%
          );
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        -webkit-text-stroke: 1px rgba(219, 246, 255, 0.74);
        filter:
          drop-shadow(0 0 1px rgba(255, 255, 255, 0.66))
          drop-shadow(0 0 4px rgba(174, 229, 255, 0.36))
          drop-shadow(0 0 10px rgba(75, 159, 230, 0.24))
          drop-shadow(0 0 20px rgba(28, 94, 154, 0.2));
        text-shadow:
          0 -1px 0 rgba(255, 255, 255, 0.44),
          0 1px 0 rgba(37, 76, 105, 0.38),
          0 1px 2px rgba(0, 4, 10, 0.34),
          0 0 4px rgba(167, 226, 255, 0.34),
          0 0 12px rgba(77, 163, 242, 0.24);
      }

      .brand-logo::before,
      .brand-logo::after {
        position: absolute;
        inset: 0;
        content: attr(data-text);
        pointer-events: none;
      }

      .brand-logo::before {
        z-index: -1;
        color: rgba(113, 196, 255, 0.22);
        -webkit-text-fill-color: rgba(113, 196, 255, 0.22);
        -webkit-text-stroke: 1px rgba(90, 181, 255, 0.14);
        filter: blur(5px);
        text-shadow:
          0 0 6px rgba(147, 220, 255, 0.34),
          0 0 16px rgba(79, 168, 255, 0.25),
          0 0 34px rgba(35, 110, 178, 0.18);
      }

      .brand-logo::after {
        z-index: 1;
        color: transparent;
        background:
          linear-gradient(
            180deg,
            rgba(255, 255, 255, 0.52) 0%,
            rgba(255, 255, 255, 0.22) 16%,
            rgba(255, 255, 255, 0.04) 42%,
            rgba(19, 49, 77, 0.12) 78%,
            rgba(255, 255, 255, 0.1) 100%
          );
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        -webkit-text-stroke: 1px rgba(255, 255, 255, 0.16);
        mix-blend-mode: screen;
      }

      p {
        margin: 0;
      }

      .lede {
        margin-top: 28px;
        margin-bottom: 24px;
        color: rgba(221, 235, 244, 0.72);
        font-size: clamp(1rem, 1.5vw, 1.2rem);
        width: min(100%, calc(100vw - 36px));
        max-width: 48rem;
        min-width: 0;
        overflow-wrap: break-word;
        text-wrap: balance;
        text-shadow: 0 0 18px rgba(31, 82, 128, 0.5);
      }

      .links {
        display: flex;
        gap: 14px;
        flex-wrap: wrap;
        justify-content: center;
      }

      a {
        color: rgba(239, 247, 252, 0.86);
        text-decoration: none;
        border-bottom: 1px solid rgba(173, 220, 248, 0.72);
        padding-bottom: 2px;
      }

      @media (max-width: 640px) {
        .page {
          padding: 36px 18px;
        }

        .logo-field {
          margin-top: 0;
        }

        .brand-logo {
          font-size: clamp(0.78rem, 3.9vw, 1.8rem);
          letter-spacing: 0.006em;
          -webkit-text-stroke-width: 0.7px;
        }

        .lede {
          font-size: 1rem;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <div class="logo-field">
        <h1 class="brand-logo" data-text="MARES ENGINEERING">MARES ENGINEERING</h1>
      </div>
      <p class="lede">
        We build restrained interfaces for race-critical information.
      </p>
      <div class="links">
        <a href="vica/index.html">VICA</a>
        <a href="minimai/index.html">Minimai</a>
      </div>
    </main>
  </body>
</html>
