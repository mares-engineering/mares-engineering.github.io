<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mares Engineering</title>
    <style>
      :root {
        --bg: #090909;
        --fg: #efefef;
        --muted: #b4b4b4;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--fg);
        min-height: 100vh;
        font-family: 'Eurostile Extended Black', 'Eurostyle Extended Black', 'Eurostile Extended', Impact, sans-serif;
        font-weight: 900;
        font-stretch: expanded;
        letter-spacing: 0.01em;
      }

      .page {
        max-width: 720px;
        margin: 0 auto;
        padding: 56px 24px;
        line-height: 1.55;
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(1.8rem, 4vw, 2.4rem);
      }

      p {
        margin: 0;
      }

      .lede {
        margin-bottom: 26px;
        color: var(--muted);
        font-size: 1.05rem;
      }

      .links {
        display: flex;
        gap: 14px;
        flex-wrap: wrap;
      }

      a {
        color: var(--fg);
        text-decoration: none;
        border-bottom: 1px solid var(--fg);
        padding-bottom: 2px;
      }
    </style>
  </head>
  <body>
    <main class="page">
      <h1>Mares Engineering</h1>
      <p class="lede">
        We build restrained interfaces for race-critical information.
      </p>
      <div class="links">
        <a href="vica/index.html">VICA</a>
        <a href="minimai/index.html">Minimai</a>
      </div>
    </main>
  </body>
</html>
